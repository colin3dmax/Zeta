server {
    server_name zeta.jennieapp.com;

    root /var/www/zeta.jennieapp.com;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /zeta.wasm {
        types {
            application/wasm wasm;
        }
        default_type application/wasm;
        expires -1;
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location ~* "^/zeta-[a-f0-9]{16}\.wasm$" {
        types {
            application/wasm wasm;
        }
        default_type application/wasm;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:css|js|mjs|wasm|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/zeta.jennieapp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zeta.jennieapp.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    listen [::]:80;
    server_name zeta.jennieapp.com;
    return 301 https://$host$request_uri;
}
