server {
    listen 80;
    listen [::]:80;
    server_name zeta.jennieapp.com;

    root /var/www/zeta.jennieapp.com;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|mjs|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
